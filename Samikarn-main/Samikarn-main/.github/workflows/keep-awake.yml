name: Keep Backend Awake

on:
  schedule:
    # Runs every 10 minutes to keep the Render free tier awake
    - cron: '*/10 * * * *'
  workflow_dispatch: # Allows you to manually trigger it from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Backend
        run: curl -s https://samikarn-backend.onrender.com/api/health > /dev/null
